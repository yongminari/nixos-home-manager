"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](#a3d2a5)\
[ ÔĆą ](bg:#a3d2a5 fg:#090c0c)\
[Óāī](bg:#76f07e fg:#a3d2a5)\
$directory\
[Óāī](fg:#76f07e bg:#39603b)\
$git_branch\
$git_status\
[Óāī](fg:#39603b bg:#213622)\
$nodejs\
$rust\
$golang\
$php\
[Óāī](fg:#213622 bg:#1d301e)\
$time\
[Óāī ](fg:#1d301e)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#76f07e"
format = "[ $path ]($style)"
truncation_length = 5

[git_branch]
style = "bg:#39603b"
format = '[[ $symbol $branch ](fg:#76f07e bg:#39603b)]($style)'

[git_status]
style = "bg:#39603b"
format = '[[($all_status$ahead_behind )](fg:#76f07e bg:#39603b)]($style)'

[time]
disabled = false
style = "bg:#1d301e"
format = '[[ Ôźļ $time ](fg:#a0cba1 bg:#1d301e)]($style)'
